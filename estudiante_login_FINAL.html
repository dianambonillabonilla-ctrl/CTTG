<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTTG Medicina - Login Estudiante</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; }
        .login-box { background: white; border-radius: 10px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .login-box h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .login-box p { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; font-size: 14px; }
        .alert.error { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; display: block; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 14px; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>🎓 CTTG Medicina</h1>
            <p>Ingresa como Estudiante</p>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="tu@correo.usc.edu.co" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña" required>
                </div>

                <button type="submit" class="btn" id="btnLogin">Ingresar</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVdNuiAgme0s74vtTRgh_YKLfNBVdtyqS0-18ouMQqwE_Z0xS5t0VcKDUh4Xaql1DB/exec";

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            document.getElementById("btnLogin").disabled = true;
            document.getElementById("btnLogin").textContent = "Verificando...";

            try {
                const response = await fetch(APP_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "login",
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success && data.user.rol === "estudiante") {
                    localStorage.setItem("usuarioEstudiante", JSON.stringify({
                        email: data.user.email,
                        nombre: data.user.nombre,
                        rol: data.user.rol
                    }));
                    window.location.href = "estudiante_radicacion.html";
                } else if (data.success && data.user.rol !== "estudiante") {
                    mostrarAlerta("Este usuario no es estudiante. Por favor usa tu cuenta de estudiante.");
                } else {
                    mostrarAlerta(data.error || "Email o contraseña incorrectos");
                }
            } catch (error) {
                mostrarAlerta("Error de conexión: " + error.message);
            } finally {
                document.getElementById("btnLogin").disabled = false;
                document.getElementById("btnLogin").textContent = "Ingresar";
            }
        });

        function mostrarAlerta(mensaje) {
            const alert = document.getElementById("alert");
            alert.textContent = mensaje;
            alert.className = "alert error";
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
