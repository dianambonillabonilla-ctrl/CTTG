<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTTG Medicina 2025</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 24px; font-weight: 500; }
        .header p { color: #666; font-size: 14px; }
        button { padding: 0.75rem 1rem; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; }
        button:hover { background: #f9f9f9; }
        .btn-success { background: #22c55e; color: white; border: none; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: white; border: none; }
        .btn-danger:hover { background: #dc2626; }
        input, select, textarea { padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .toolbar { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
        .toolbar-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1rem; }
        .toolbar-buttons { display: flex; gap: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 500; font-size: 13px; border-bottom: 1px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background: #fafafa; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal-content { background: white; border-radius: 8px; padding: 2rem; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
        .modal-body { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
        .modal-footer { display: flex; gap: 12px; justify-content: flex-end; }
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
        .auth-box { background: white; border-radius: 8px; border: 1px solid #ddd; padding: 2rem; max-width: 400px; width: 100%; }
        .auth-box h1 { font-size: 22px; font-weight: 500; margin-bottom: 1rem; }
        .auth-box p { color: #666; margin-bottom: 1.5rem; font-size: 14px; }
        .auth-box input { margin-bottom: 1rem; }
        .search-input { position: relative; }
        .search-input input { padding-left: 36px; }
        .small-text { font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLUMNS = [
            'AÑO', 'Fecha de recepción por el CTTG', 'P', 'Integrante del CTTG', 'PROCESO EVALUADO',
            'Numero de acta', 'Título de Trabajo de grado', 'Puntaje del turnitin',
            'Modalidad de trabajo de grado', 'Estudiantes', 'Numero de estudiantes',
            'Nombre del Director (a)', 'Decisión del CTTG MEDICINA', 'Observaciones del evaluador',
            'Semillero al que pertenece', 'Jurado1', 'Jurado 2', 'Fecha de sustentación',
            'Numero acta de sustentación', 'Nota de la sustentación', 'Observaciones',
            'ESTADO DEL ACTA'
        ];

        function CTTGApp() {
            const [authState, setAuthState] = useState('login');
            const [email, setEmail] = useState('');
            const [verificationCode, setVerificationCode] = useState('');
            const [students, setStudents] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editingData, setEditingData] = useState({});

            useEffect(() => {
                const saved = localStorage.getItem('students');
                if (saved) setStudents(JSON.parse(saved));
            }, []);

            const handleSendCode = () => {
                if (!email.trim()) return;
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                localStorage.setItem('verif_code', code);
                localStorage.setItem('verif_email', email);
                alert(`Código para ${email}: ${code}`);
                setAuthState('verify');
            };

            const handleVerifyCode = () => {
                const savedCode = localStorage.getItem('verif_code');
                if (verificationCode === savedCode) {
                    setAuthState('app');
                } else {
                    alert('Código incorrecto');
                }
            };

            const handleEdit = (student) => {
                setEditingId(student.id);
                setEditingData({ ...student });
            };

            const handleSave = () => {
                const updated = students.map(s => s.id === editingId ? editingData : s);
                setStudents(updated);
                localStorage.setItem('students', JSON.stringify(updated));
                setEditingId(null);
            };

            const handleDelete = (id) => {
                if (confirm('¿Eliminar este registro?')) {
                    const updated = students.filter(s => s.id !== id);
                    setStudents(updated);
                    localStorage.setItem('students', JSON.stringify(updated));
                }
            };

            const handleAddNew = () => {
                const newId = Math.max(...students.map(s => s.id), -1) + 1;
                const newStudent = {
                    id: newId,
                    ...Object.fromEntries(COLUMNS.map(col => [col, '']))
                };
                setStudents([newStudent, ...students]);
                setEditingId(newId);
                setEditingData(newStudent);
            };

            const filteredStudents = students.filter(student =>
                COLUMNS.some(col =>
                    String(student[col] || '').toLowerCase().includes(searchTerm.toLowerCase())
                )
            );

            if (authState === 'login') {
                return (
                    <div className="auth-page">
                        <div className="auth-box">
                            <h1>Seguimiento CTTG</h1>
                            <p>Ingresa tu correo personal para recibir un código de verificación</p>
                            <input
                                type="email"
                                placeholder="tu.correo@ejemplo.com"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                            />
                            <button className="btn-success" onClick={handleSendCode} style={{width: '100%'}}>
                                Enviar código
                            </button>
                        </div>
                    </div>
                );
            }

            if (authState === 'verify') {
                return (
                    <div className="auth-page">
                        <div className="auth-box">
                            <h1>Verificación</h1>
                            <p>Ingresa el código enviado a {email}</p>
                            <input
                                type="text"
                                placeholder="Código de 6 dígitos"
                                value={verificationCode}
                                onChange={(e) => setVerificationCode(e.target.value.toUpperCase())}
                                maxLength="6"
                                style={{letterSpacing: '4px', fontSize: '18px'}}
                            />
                            <button className="btn-success" onClick={handleVerifyCode} style={{width: '100%', marginBottom: '1rem'}}>
                                Verificar
                            </button>
                            <button onClick={() => { setAuthState('login'); setVerificationCode(''); }} style={{width: '100%'}}>
                                Cambiar correo
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="header">
                        <div>
                            <h1>Seguimiento CTTG Medicina 2025</h1>
                            <p>Total de registros: {filteredStudents.length}</p>
                        </div>
                        <button onClick={() => { setAuthState('login'); localStorage.clear(); }}>
                            Salir
                        </button>
                    </div>

                    <div className="toolbar">
                        <div className="toolbar-row">
                            <input
                                type="text"
                                placeholder="Buscar..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="toolbar-buttons">
                            <button className="btn-success" onClick={handleAddNew}>+ Nuevo</button>
                            <button onClick={() => {
                                const csv = [
                                    COLUMNS.join(','),
                                    ...filteredStudents.map(s => COLUMNS.map(col => `"${s[col] || ''}"`).join(','))
                                ].join('\n');
                                const blob = new Blob([csv], { type: 'text/csv' });
                                const link = document.createElement('a');
                                link.href = URL.createObjectURL(blob);
                                link.download = `CTTG_${new Date().toISOString().split('T')[0]}.csv`;
                                link.click();
                            }}>
                                Exportar CSV
                            </button>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Acciones</th>
                                {COLUMNS.slice(0, 8).map(col => <th key={col}>{col}</th>)}
                                <th>Más...</th>
                            </tr>
                        </thead>
                        <tbody>
                            {filteredStudents.map((student) => (
                                <tr key={student.id}>
                                    <td>
                                        <button onClick={() => handleEdit(student)} style={{padding: '4px 8px', marginRight: '4px'}}>✎</button>
                                        <button onClick={() => handleDelete(student.id)} className="btn-danger" style={{padding: '4px 8px'}}>✕</button>
                                    </td>
                                    {COLUMNS.slice(0, 8).map(col => (
                                        <td key={col}>{student[col] || '-'}</td>
                                    ))}
                                    <td className="small-text">+{COLUMNS.length - 8} campos</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    {editingId !== null && (
                        <div className="modal">
                            <div className="modal-content">
                                <div className="modal-header">Editar Registro</div>
                                <div className="modal-body">
                                    {COLUMNS.map(col => (
                                        <div key={col} className="form-group">
                                            <label>{col}</label>
                                            <input
                                                type="text"
                                                value={editingData[col] || ''}
                                                onChange={(e) => setEditingData({ ...editingData, [col]: e.target.value })}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="modal-footer">
                                    <button onClick={() => setEditingId(null)}>Cancelar</button>
                                    <button className="btn-success" onClick={handleSave}>Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<CTTGApp />);
    </script>
</body>
</html>
