<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Coordinadora</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fa; padding: 20px; }
        .top-bar { background: #764ba2; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9fafb; }
    </style>
</head>
<body>
    <div class="top-bar"><h1>📊 Panel de Control</h1></div>
    <div class="stats">
        <div class="stat-card"><h3>Total</h3><div id="totalRad">0</div></div>
    </div>
    <div id="tableContainer">Cargando datos...</div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxVdNuiAgme0s74vtTRgh_YKLfNBVdtyqS0-18ouMQqwE_Z0xS5t0VcKDUh4Xaql1DB/exec";

        async function cargar() {
            const resp = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "getFase1" }) });
            const data = await resp.json();
            if (data.success) {
                document.getElementById("totalRad").textContent = data.radicaciones.length;
                document.getElementById("tableContainer").innerHTML = `
                    <table>
                        <tr><th>Número</th><th>Estudiante</th><th>Título</th><th>Estado</th></tr>
                        ${data.radicaciones.map(r => `<tr><td>${r.numero}</td><td>${r.nombre1}</td><td>${r.titulo}</td><td>${r.estado}</td></tr>`).join('')}
                    </table>`;
            }
        }
        cargar();
    </script>
</body>
</html>
