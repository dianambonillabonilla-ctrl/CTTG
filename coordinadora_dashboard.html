<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - CTTG</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 30px; margin: 0; }
        .header { background: #764ba2; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background: #f1f5f9; color: #475569; font-weight: bold; }
        .status { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Seguimiento de Radicaciones</h1>
        <button onclick="location.href='index.html'" style="background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Cerrar</button>
    </div>
    <div id="tableContainer">Cargando registros...</div>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzriRobDKKzBoNbaijxHK1O_niLzdSKdGwl1gsERMAgbAFgkBoKNN4mt9aseENyeXKs/exec";
        async function cargar() {
            try {
                const resp = await fetch(APP_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getFase1" }) });
                const data = await resp.json();
                if (data.success) {
                    let html = `<table><tr><th>Número</th><th>Estudiante</th><th>Título</th><th>Fecha</th><th>Estado</th></tr>`;
                    data.radicaciones.forEach(r => {
                        html += `<tr><td><strong>${r.numero}</strong></td><td>${r.nombre1}</td><td>${r.titulo}</td><td>${r.fecha}</td><td><span class="status">${r.estado}</span></td></tr>`;
                    });
                    html += `</table>`;
                    document.getElementById("tableContainer").innerHTML = html;
                }
            } catch(e) { document.getElementById("tableContainer").innerHTML = "Error al cargar datos."; }
        }
        cargar();
    </script>
</body>
</html>
