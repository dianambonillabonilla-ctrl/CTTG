<script>
    const API = "https://script.google.com/macros/s/AKfycbzriRobDKKzBoNbaijxHK1O_niLzdSKdGwl1gsERMAgbAFgkBoKNN4mt9aseENyeXKs/exec";
    async function login() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("pass").value;
        const res = await fetch(API, { method: "POST", body: JSON.stringify({ action: "login", email: email, password: pass }) });
        const data = await res.json();
        if (data.success && data.user.rol === "estudiante") {
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location.href = "estudiante_panel.html"; // CAMBIO AQUÍ
        } else {
            alert("Usuario o clave incorrecta");
        }
    }
</script>
