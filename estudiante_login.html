<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Estudiante — CTTG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1a0533,#2d1b69,#1a3a5c);display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .back{color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;transition:color .2s}
  .back:hover{color:#fff}
  .logo{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px}
  h2{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:4px}
  .desc{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px}
  .fg{margin-bottom:16px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.5);margin-bottom:6px}
  input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color .2s}
  input::placeholder{color:rgba(255,255,255,.3)}
  input:focus{border-color:rgba(102,126,234,.7);background:rgba(255,255,255,.1)}
  .err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
  .btn{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;box-shadow:0 4px 15px rgba(102,126,234,.4)}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.6;transform:none;cursor:not-allowed}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="back">← Volver</a>
  <div class="logo">🎓</div>
  <h2>Ingreso Estudiante</h2>
  <p class="desc">Accede con tu correo institucional USC</p>
  <div id="err" class="err"></div>
  <div class="fg"><label>Correo institucional</label><input type="email" id="email" placeholder="tu@usc.edu.co" autocomplete="email"></div>
  <div class="fg"><label>Contraseña</label><input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn" id="btn" onclick="login()">Ingresar al sistema</button>
</div>
<script>
const URL_APP = "https://script.google.com/macros/s/AKfycbxThWOEZZWmJTZ9SsAdEOE7a2e0ai9uddlZBGTUz7rt-iq2VepCf0YC8r4trjAiF7MhlA/exec";
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value.trim();
  const err   = document.getElementById('err');
  const btn   = document.getElementById('btn');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Completa todos los campos'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Verificando...';
  try {
    const res  = await fetch(URL_APP, { method: 'POST', body: JSON.stringify({ action: 'login', email, password: pass }) });
    const data = await res.json();
    if (data.success && data.user.rol === 'estudiante') {
      localStorage.setItem('cttg_user', JSON.stringify(data.user));
      window.location.href = 'estudiante_dashboard.html';
    } else if (data.success && data.user.rol !== 'estudiante') {
      err.textContent = 'Esta cuenta no tiene perfil de estudiante.'; err.style.display = 'block';
    } else {
      err.textContent = data.error || 'Credenciales incorrectas'; err.style.display = 'block';
    }
  } catch(e) { err.textContent = 'Error de conexión. Intenta de nuevo.'; err.style.display = 'block'; }
  finally { btn.disabled = false; btn.innerHTML = 'Ingresar al sistema'; }
}
</script>
</body>
</html>
