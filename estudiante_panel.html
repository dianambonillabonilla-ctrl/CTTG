<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTTG Medicina - Panel Estudiante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .user-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .user-info strong {
            color: #333;
        }

        .phases-container {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .phase-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .phase-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .phase-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #eee;
        }

        .phase-header.completed {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-bottom: none;
        }

        .phase-header.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-bottom: none;
        }

        .phase-header.inactive {
            background: #f9fafb;
            color: #9ca3af;
        }

        .phase-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .phase-icon {
            font-size: 32px;
        }

        .phase-title {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .phase-title h2 {
            font-size: 20px;
            margin: 0;
        }

        .phase-title p {
            font-size: 13px;
            opacity: 0.9;
        }

        .phase-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .status-inactive {
            background: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
        }

        .phase-body {
            padding: 20px;
            background: #fafafa;
        }

        .phase-body.completed,
        .phase-body.active {
            background: white;
        }

        .phase-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .detail-item.completed {
            border-left-color: #10b981;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .phase-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn-disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .btn-disabled:hover {
            background: #e5e7eb;
        }

        .countdown {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #92400e;
            margin-bottom: 15px;
        }

        .countdown strong {
            color: #d97706;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 22px;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: block;
        }

        .toast.success {
            border-left: 4px solid #10b981;
            color: #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
            color: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Mi Progreso CTTG Medicina</h1>
            <p>Seguimiento de fases del trabajo de grado</p>
            <div class="user-info">
                <strong>Usuario:</strong> <span id="usuarioNombre">—</span> | 
                <strong>Radicación:</strong> <span id="numeroRadicacion">—</span> | 
                <strong>Fecha:</strong> <span id="fechaRadicacion">—</span>
            </div>
        </div>

        <div class="phases-container" id="phasesContainer">
            <!-- Se llenará con JavaScript -->
        </div>
    </div>

    <!-- MODAL CAMBIO TUTOR -->
    <div class="modal" id="modalTutor">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Solicitar Cambio de Tutor</h2>
                <button class="modal-close" onclick="cerrarModal()">×</button>
            </div>
            <form id="formCambioTutor">
                <div class="form-group">
                    <label>Tutor Actual</label>
                    <input type="text" id="tutorActual" readonly style="background: #f5f5f5;">
                </div>
                <div class="form-group">
                    <label>Nuevo Tutor *</label>
                    <input type="text" id="nuevoTutor" placeholder="Nombre del nuevo tutor" required>
                </div>
                <div class="form-group">
                    <label>Email Nuevo Tutor *</label>
                    <input type="email" id="emailNuevoTutor" placeholder="Email del nuevo tutor" required>
                </div>
                <div class="form-group">
                    <label>Teléfono Nuevo Tutor</label>
                    <input type="tel" id="telNuevoTutor" placeholder="Teléfono">
                </div>
                <div class="form-group">
                    <label>Motivo del Cambio *</label>
                    <textarea id="motivoCambio" placeholder="Explica el motivo del cambio de tutor" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPkshyhXbW8gDduKMAdsM5VHm2wF3OOjiDz6zesc_XdHIBa4FcQJxABr1UwSxxRLWZ/exec";

        // Datos del estudiante (del localStorage)
        let usuarioActual = JSON.parse(localStorage.getItem("usuarioEstudianteActual") || '{}');
        let radicacionActual = null;

        // Fases
        const fases = [
            {
                id: 1,
                numero: "FASE 1",
                nombre: "Radicación",
                descripcion: "Radicación de intención de trabajo de grado",
                icon: "📋",
                estado: "completed",
                campos: ["Cédula", "Nombre", "Email", "Teléfono", "Semestre"]
            },
            {
                id: 2,
                numero: "FASE 2",
                nombre: "Protocolo",
                descripcion: "Carga y evaluación del protocolo de investigación",
                icon: "📄",
                estado: "active",
                campos: ["Protocolo", "Turnitin", "Evaluación Comité"],
                plazo: "Hasta 1 año o semestre 11"
            },
            {
                id: 3,
                numero: "FASE 3",
                nombre: "Sustentación",
                descripcion: "Sustentación y calificación final",
                icon: "🎤",
                estado: "inactive",
                campos: ["Presentación", "Evaluadores", "Calificación"],
                plazo: "Después de Protocolo"
            }
        ];

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            cargarDatos();
            renderizarFases();
            setupFormulario();
        });

        async function cargarDatos() {
            try {
                // Obtener radicación actual
                const response = await fetch(APP_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "getRadicacionesPendientes"
                    })
                });

                const data = await response.text();
                const resultado = JSON.parse(data);

                if (resultado.success && resultado.radicaciones && resultado.radicaciones.length > 0) {
                    radicacionActual = resultado.radicaciones[0];
                    
                    document.getElementById("usuarioNombre").textContent = usuarioActual.nombre || "—";
                    document.getElementById("numeroRadicacion").textContent = radicacionActual.numero || "—";
                    document.getElementById("fechaRadicacion").textContent = formatearFecha(radicacionActual.fecha) || "—";
                }
            } catch (error) {
                console.error("Error al cargar datos:", error);
            }
        }

        function renderizarFases() {
            const container = document.getElementById("phasesContainer");
            
            container.innerHTML = fases.map((fase, idx) => {
                const isCompleted = fase.estado === "completed";
                const isActive = fase.estado === "active";
                const isInactive = fase.estado === "inactive";

                let statusHTML = "";
                if (isCompleted) {
                    statusHTML = '<span class="phase-status status-completed">✓ Completada</span>';
                } else if (isActive) {
                    statusHTML = '<span class="phase-status status-active">⟳ En curso</span>';
                } else {
                    statusHTML = '<span class="phase-status status-inactive">⏱ Próxima</span>';
                }

                let detallesHTML = "";
                if (isCompleted && radicacionActual) {
                    detallesHTML = `
                        <div class="detail-item completed">
                            <div class="detail-label">Nombre Estudiante</div>
                            <div class="detail-value">${radicacionActual.nombre || "—"}</div>
                        </div>
                        <div class="detail-item completed">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${radicacionActual.email || "—"}</div>
                        </div>
                        <div class="detail-item completed">
                            <div class="detail-label">Modalidad</div>
                            <div class="detail-value">${radicacionActual.modalidad || "—"}</div>
                        </div>
                        <div class="detail-item completed">
                            <div class="detail-label">Estado</div>
                            <div class="detail-value">${radicacionActual.estado || "—"}</div>
                        </div>
                    `;
                }

                let countdownHTML = "";
                if (isActive) {
                    countdownHTML = `
                        <div class="countdown">
                            <strong>⏰ Plazo:</strong> ${fase.plazo}
                        </div>
                    `;
                }

                let actionsHTML = "";
                if (isCompleted || isActive) {
                    actionsHTML = `
                        <div class="phase-actions">
                            <button class="btn btn-primary" onclick="abrirModalTutor('${fase.numero}')">👥 Cambiar Tutor</button>
                            <button class="btn btn-secondary" onclick="verDetalles('${fase.id}')">📊 Ver Detalles</button>
                        </div>
                    `;
                } else {
                    actionsHTML = `
                        <div class="phase-actions">
                            <button class="btn btn-disabled" disabled>Próximamente disponible</button>
                        </div>
                    `;
                }

                return `
                    <div class="phase-card">
                        <div class="phase-header ${fase.estado}">
                            <div class="phase-info">
                                <div class="phase-icon">${fase.icon}</div>
                                <div class="phase-title">
                                    <h2>${fase.numero}: ${fase.nombre}</h2>
                                    <p>${fase.descripcion}</p>
                                </div>
                            </div>
                            ${statusHTML}
                        </div>
                        <div class="phase-body ${fase.estado}">
                            ${countdownHTML}
                            ${detallesHTML ? `<div class="phase-details">${detallesHTML}</div>` : ''}
                            ${actionsHTML}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function abrirModalTutor(fase) {
            document.getElementById("modalTutor").classList.add("active");
            document.getElementById("tutorActual").value = `Tutor Actual - ${fase}`;
            document.getElementById("formCambioTutor").dataset.fase = fase;
        }

        function cerrarModal() {
            document.getElementById("modalTutor").classList.remove("active");
            document.getElementById("formCambioTutor").reset();
        }

        function setupFormulario() {
            document.getElementById("formCambioTutor").addEventListener("submit", async (e) => {
                e.preventDefault();

                const datos = {
                    fase: document.getElementById("formCambioTutor").dataset.fase,
                    tutorActual: document.getElementById("tutorActual").value,
                    nuevoTutor: document.getElementById("nuevoTutor").value,
                    emailNuevoTutor: document.getElementById("emailNuevoTutor").value,
                    telNuevoTutor: document.getElementById("telNuevoTutor").value,
                    motivo: document.getElementById("motivoCambio").value,
                    radicacion: radicacionActual.numero,
                    emailEstudiante: usuarioActual.email,
                    fecha: new Date().toISOString().split('T')[0]
                };

                try {
                    const response = await fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "guardarSolicitudCambioTutor",
                            solicitud: datos
                        })
                    });

                    const result = await response.text();
                    const parsed = JSON.parse(result);

                    if (parsed.success) {
                        mostrarToast("Solicitud enviada correctamente", "success");
                        cerrarModal();
                    } else {
                        mostrarToast("Error: " + (parsed.error || "No se pudo enviar"), "error");
                    }
                } catch (error) {
                    mostrarToast("Error de conexión: " + error.message, "error");
                }
            });
        }

        function verDetalles(faseId) {
            mostrarToast("Funcionalidad próximamente...", "success");
        }

        function formatearFecha(fecha) {
            if (!fecha) return "—";
            const d = new Date(fecha);
            return d.toLocaleDateString('es-CO');
        }

        function mostrarToast(mensaje, tipo = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = mensaje;
            toast.className = `toast show ${tipo}`;
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        // Cerrar modal al presionar ESC
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") cerrarModal();
        });

        // Cerrar modal al hacer click fuera
        document.getElementById("modalTutor").addEventListener("click", (e) => {
            if (e.target === document.getElementById("modalTutor")) cerrarModal();
        });
    </script>
</body>
</html>
