<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Coordinadora</title>
    <style>
        body { font-family: sans-serif; background: #10b981; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 8px; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #059669; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Acceso Coordinación</h2>
        <input type="email" id="email" placeholder="Correo administrativo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>
    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzriRobDKKzBoNbaijxHK1O_niLzdSKdGwl1gsERMAgbAFgkBoKNN4mt9aseENyeXKs/exec";
        async function login() {
            const res = await fetch(APP_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", email: document.getElementById("email").value, password: document.getElementById("pass").value }) });
            const data = await res.json();
            if (data.success && data.user.rol === "coordinadora") {
                localStorage.setItem("admin", JSON.stringify(data.user));
                window.location.href = "coordinadora_dashboard.html";
            } else { alert("Acceso restringido"); }
        }
    </script>
</body>
</html>
