<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Fase 2 — Panel Coordinadora</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;min-height:100vh;background:linear-gradient(135deg,#064e3b,#059669,#1a3a5c);padding:20px}
  .container{max-width:1200px;margin:0 auto}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;color:#fff}
  .header h1{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px}
  .header-sub{color:rgba(255,255,255,.6);font-size:13px}
  .btn-logout{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-logout:hover{background:rgba(255,255,255,.3)}
  .table-container{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:20px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th{background:rgba(255,255,255,.08);padding:12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.6);border-bottom:1px solid rgba(255,255,255,.1)}
  td{padding:12px;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.8);font-size:13px}
  tr:hover{background:rgba(255,255,255,.03)}
  .badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600}
  .badge-enviado{background:rgba(59,130,246,.2);color:#93c5fd}
  .badge-evaluacion{background:rgba(251,146,60,.2);color:#fed7aa}
  .badge-aprobado{background:rgba(34,197,94,.2);color:#86efac}
  .badge-devuelto{background:rgba(239,68,68,.2);color:#fca5a5}
  .actions{display:flex;gap:6px}
  .btn-small{padding:6px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .2s;color:#fff}
  .btn-view{background:rgba(102,126,234,.4);border:1px solid rgba(102,126,234,.6)}
  .btn-view:hover{background:rgba(102,126,234,.6)}
  .btn-edit{background:rgba(16,185,129,.4);border:1px solid rgba(16,185,129,.6)}
  .btn-edit:hover{background:rgba(16,185,129,.6)}
  .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
  .modal.active{display:flex}
  .modal-content{background:rgba(255,255,255,.95);border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
  .modal-header{font-family:'DM Serif Display',serif;font-size:18px;color:#1a0533;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#666}
  .modal-fg{margin-bottom:14px}
  .modal-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#666;margin-bottom:6px}
  .modal-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px}
  .modal-textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px;min-height:80px;resize:vertical}
  .modal-button{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;padding:10px 16px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;margin-top:16px;width:100%}
  .empty{text-align:center;padding:40px;color:rgba(255,255,255,.5);font-size:14px}
  .err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:10px;font-size:12px;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📄 Protocolo Fase 2</h1>
      <p class="header-sub">Gestión de protocolos enviados por estudiantes</p>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="table-container">
    <div id="err" class="err"></div>
    <table id="tablaProtocolos">
      <thead>
        <tr>
          <th>N° Radicación</th>
          <th>Estudiante</th>
          <th>Archivo</th>
          <th>Fecha Carga</th>
          <th>Anexo</th>
          <th>Estado</th>
          <th>Evaluador</th>
          <th>Decisión</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9" class="empty">Cargando protocolos...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal para editar protocolo -->
<div id="modalEditar" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      Evaluar Protocolo
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div id="errModal" class="err"></div>
    
    <div class="modal-fg">
      <label class="modal-label">Número Radicación</label>
      <input type="text" id="modalNumero" readonly class="modal-input" style="opacity:.7">
    </div>

    <div class="modal-fg">
      <label class="modal-label">Asignar Evaluador</label>
      <input type="text" id="modalEvaluador" class="modal-input" placeholder="Ej: Dr. Juan Pérez">
    </div>

    <div class="modal-fg">
      <label class="modal-label">Fecha Reunión Comité</label>
      <input type="date" id="modalFechaReunion" class="modal-input">
    </div>

    <div class="modal-fg">
      <label class="modal-label">Decisión del Comité</label>
      <select id="modalDecision" class="modal-input" onchange="mostrarMotivo()">
        <option value="">— Selecciona —</option>
        <option value="Aprobado">✅ Aprobado</option>
        <option value="Devuelto">↩️ Devuelto para Corrección</option>
      </select>
    </div>

    <div class="modal-fg" id="motivoDiv" style="display:none">
      <label class="modal-label">Motivo de Devolución (si aplica)</label>
      <textarea id="modalMotivo" class="modal-textarea" placeholder="Describe las correcciones necesarias..."></textarea>
    </div>

    <button class="modal-button" onclick="guardarEvaluacion()">Guardar Evaluación</button>
  </div>
</div>

<script>
const URL_APP = "https://script.google.com/macros/s/AKfycbxThWOEZZWmJTZ9SsAdEOE7a2e0ai9uddlZBGTUz7rt-iq2VepCf0YC8r4trjAiF7MhlA/exec
";
let protocoloActual = null;

document.addEventListener('DOMContentLoaded', function() {
  const user = JSON.parse(localStorage.getItem('cttg_admin') || '{}');
  if (!user.id || user.rol !== 'coordinadora') {
    window.location.href = 'coordinadora_login.html';
    return;
  }
  cargarProtocolos();
});

function cargarProtocolos() {
  fetch(URL_APP, {
    method: 'POST',
    body: JSON.stringify({ action: 'getFase2' })
  })
  .then(r => r.json())
  .then(data => {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (data.success && data.protocolos && data.protocolos.length > 0) {
      data.protocolos.forEach(p => {
        const tr = document.createElement('tr');
        const estadoBadge = {
          'Enviado': '<span class="badge badge-enviado">📤 Enviado</span>',
          'En Evaluación': '<span class="badge badge-evaluacion">📝 Evaluando</span>',
          'Aprobado': '<span class="badge badge-aprobado">✅ Aprobado</span>',
          'Devuelto': '<span class="badge badge-devuelto">↩️ Devuelto</span>'
        }[p.estado] || p.estado;

        tr.innerHTML = `
          <td><strong>${p.numero}</strong></td>
          <td>${p.emailEstudiante}</td>
          <td><a href="${p.urlArchivo}" target="_blank" style="color:#a5b4fc;text-decoration:none">📄 ${p.nombreArchivo.substring(0, 30)}...</a></td>
          <td>${p.fechaCarga}</td>
          <td>${p.anexoCambio}</td>
          <td>${estadoBadge}</td>
          <td>${p.evaluador || '—'}</td>
          <td>${p.decision || '—'}</td>
          <td>
            <div class="actions">
              <button class="btn-small btn-view" onclick="abrirModal('${p.numero}', ${p.rowIndex})">Evaluar</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } else {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">No hay protocolos para evaluar</td></tr>';
    }
  })
  .catch(e => {
    document.getElementById('err').textContent = 'Error al cargar protocolos: ' + e.message;
    document.getElementById('err').style.display = 'block';
  });
}

function abrirModal(numero, rowIndex) {
  protocoloActual = { numero, rowIndex };
  document.getElementById('modalNumero').value = numero;
  document.getElementById('modalEvaluador').value = '';
  document.getElementById('modalFechaReunion').value = '';
  document.getElementById('modalDecision').value = '';
  document.getElementById('modalMotivo').value = '';
  document.getElementById('motivoDiv').style.display = 'none';
  document.getElementById('errModal').style.display = 'none';
  document.getElementById('modalEditar').classList.add('active');
}

function cerrarModal() {
  document.getElementById('modalEditar').classList.remove('active');
  protocoloActual = null;
}

function mostrarMotivo() {
  const decision = document.getElementById('modalDecision').value;
  document.getElementById('motivoDiv').style.display = decision === 'Devuelto' ? 'block' : 'none';
}

function guardarEvaluacion() {
  if (!protocoloActual) return;

  const evaluador = document.getElementById('modalEvaluador').value.trim();
  const fechaReunion = document.getElementById('modalFechaReunion').value;
  const decision = document.getElementById('modalDecision').value;
  const motivo = document.getElementById('modalMotivo').value;
  const errModal = document.getElementById('errModal');
  const user = JSON.parse(localStorage.getItem('cttg_admin') || '{}');

  errModal.style.display = 'none';

  if (!evaluador || !fechaReunion || !decision) {
    errModal.textContent = 'Completa todos los campos requeridos';
    errModal.style.display = 'block';
    return;
  }

  if (decision === 'Devuelto' && !motivo) {
    errModal.textContent = 'Especifica el motivo de devolución';
    errModal.style.display = 'block';
    return;
  }

  fetch(URL_APP, {
    method: 'POST',
    body: JSON.stringify({
      action: 'actualizarProtocolo',
      rowIndex: protocoloActual.rowIndex,
      estado: 'En Evaluación',
      evaluador: evaluador,
      fechaReunion: fechaReunion,
      decision: decision,
      motivo: motivo,
      emailCoord: user.email
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      cerrarModal();
      cargarProtocolos();
    } else {
      errModal.textContent = data.error || 'Error al guardar';
      errModal.style.display = 'block';
    }
  })
  .catch(e => {
    errModal.textContent = 'Error de conexión: ' + e.message;
    errModal.style.display = 'block';
  });
}

function logout() {
  localStorage.removeItem('cttg_admin');
  window.location.href = 'coordinadora_login.html';
}
</script>
</body>
</html>
