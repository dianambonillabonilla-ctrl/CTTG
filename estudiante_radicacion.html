<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Radicación</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .form { background: white; padding: 20px; max-width: 600px; margin: auto; border-radius: 8px; }
        input, textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form">
        <h2>Nueva Radicación</h2>
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="cedula" placeholder="Cédula">
        <textarea id="titulo" placeholder="Título del trabajo"></textarea>
        <button onclick="radicar()">Enviar Solicitud</button>
        <h3 id="mensaje" style="display:none; color: green;"></h3>
    </div>
    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw0qSs72fbrddp5VqURjL1KPQ-JpoEL9ZJI-3cJXKfz23R12AFR8iqvGff0SCfpNDfe/exec";
        async function radicar() {
            const user = JSON.parse(localStorage.getItem("user"));
            const datos = { nombre1: document.getElementById("nombre").value, cedula1: document.getElementById("cedula").value, titulo: document.getElementById("titulo").value };
            const res = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "createRadicacion", datos, emailEstudiante: user.email }) });
            const data = await res.json();
            if (data.success) {
                document.getElementById("mensaje").innerText = "Éxito: " + data.numero;
                document.getElementById("mensaje").style.display = "block";
            }
        }
    </script>
</body>
</html>
