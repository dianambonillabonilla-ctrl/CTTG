  .btn-coord:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(16,185,129,.4)}
  .btn-icon{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .btn-text{flex:1}
  .btn-text span{display:block;font-size:11px;font-weight:400;opacity:.8;margin-top:2px}
  .footer{margin-top:28px;color:rgba(255,255,255,.35);font-size:12px;text-align:center}
