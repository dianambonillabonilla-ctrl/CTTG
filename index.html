<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTTG Medicina - Sistema de Radicación</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 50px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; max-width: 500px; width: 100%; }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #333; font-size: 32px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 40px; font-size: 15px; }
        .buttons { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .btn-student { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-coordinator { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎓</div>
        <h1>CTTG Medicina</h1>
        <p>Sistema de Radicación de Trabajos de Grado</p>
        <div class="buttons">
            <a href="estudiante_login.html" class="btn btn-student">📚 Ingresar como Estudiante</a>
            <a href="coordinadora_login.html" class="btn btn-coordinator">👩‍💼 Ingresar como Coordinadora</a>
        </div>
    </div>
</body>
</html>
